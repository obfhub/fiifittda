<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FiiFit Members</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--light-bg) 100%);
            padding: 40px 20px;
        }
        .login-card {
            background: linear-gradient(135deg, var(--dark-card) 0%, #2A2A2A 100%);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 450px;
            width: 100%;
            border: 2px solid rgba(255, 184, 77, 0.2);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        .login-card h1 {
            font-size: 32px;
            color: var(--text);
            margin-bottom: 10px;
            text-align: center;
        }
        .login-card p {
            color: var(--text-light);
            text-align: center;
            margin-bottom: 40px;
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 184, 77, 0.2);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(255, 184, 77, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 184, 77, 0.4);
        }
        .error-message {
            background: rgba(255, 59, 48, 0.1);
            border-left: 4px solid #FF3B30;
            padding: 12px;
            border-radius: 6px;
            color: #FF3B30;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1><i class="fas fa-lock" style="margin-right: 10px;"></i>FiiFit Members</h1>
            <p>Intră în contul tău pentru a accesa lecțiile</p>

            <div class="error-message" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="introdu email" required>
                </div>
                <div class="form-group">
                    <label>Parolă (ultimele 4 cifre din card)</label>
                    <input type="password" id="password" placeholder="introdu parolă" required>
                </div>
                <button type="submit" class="btn-login">Intră în Cont</button>
            </form>

            <p style="text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-light);">
                Nu ai primit email de înregistrare?<br>
                <a href="mailto:support@fiifit.online" style="color: var(--primary); text-decoration: none;">
                    <i class="fas fa-headset" style="margin-right: 5px;"></i>Contactează suportul
                </a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Simple demo validation (în producție, ar fi API call)
            if (email && password.length === 4) {
                // Save session
                localStorage.setItem('fiifit_user', JSON.stringify({
                    email: email,
                    logged_in: true,
                    login_time: new Date()
                }));
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = '❌ Email sau parolă incorectă!';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
