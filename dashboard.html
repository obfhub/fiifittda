<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - 24 Lecții | FiiFit Members</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .dashboard-header h1 {
            font-size: 44px;
            color: var(--text);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }
        .btn-logout {
            background: transparent;
            color: var(--text-light);
            border: 1px solid rgba(255, 184, 77, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-logout:hover {
            color: var(--primary);
            border-color: var(--primary);
        }
        .progress-section {
            background: linear-gradient(135deg, var(--dark-card) 0%, #2A2A2A 100%);
            padding: 40px;
            border-radius: 16px;
            border: 2px solid rgba(255, 184, 77, 0.2);
            margin-bottom: 50px;
        }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            width: 0%;
            transition: width 0.6s ease-out;
        }
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }
        .lesson-card {
            background: linear-gradient(135deg, var(--dark-card) 0%, #2A2A2A 100%);
            border-radius: 16px;
            padding: 30px;
            border: 2px solid rgba(255, 184, 77, 0.15);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .lesson-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 184, 77, 0.5);
            box-shadow: 0 20px 50px rgba(255, 184, 77, 0.2);
        }
        .lesson-number {
            display: inline-block;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 45px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .lesson-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }
        .lesson-status {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 15px;
        }
        .lesson-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(74, 222, 128, 0.2);
            color: #4ADE80;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        .lesson-locked {
            opacity: 0.6;
            pointer-events: none;
        }
        .lesson-locked::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
        }
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }
            .dashboard-header h1 {
                font-size: 32px;
            }
            .lessons-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">FiiFit Members</div>
                <nav class="nav">
                    <a href="#" onclick="logout()">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1><i class="fas fa-book" style="margin-right: 15px;"></i>Cele 24 de Lecții</h1>
                <p style="color: var(--text-light); margin-top: 10px;">Bine ai venit în programul tău de slăbire!</p>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i>Logout</button>
            </div>
        </div>

        <div class="progress-section">
            <h2 style="color: var(--text); margin-top: 0;"><i class="fas fa-chart-line" style="margin-right: 12px;"></i>Progresul tău</h2>
            <p style="color: var(--text-light);">Lecții parcurse: <span id="completedCount">0</span>/24</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p style="color: var(--text-light); font-size: 14px; margin: 10px 0 0 0;">
                <i class="fas fa-star" style="margin-right: 8px; color: var(--primary);"></i>Continua așa! Fiecare lecție te apropie de transformarea pe care o dorești.
            </p>
        </div>

        <div class="lessons-grid" id="lessonsGrid">
            <!-- Lecții vor fi generate cu JavaScript -->
        </div>
    </section>

    <script>
        const LESSONS = [
            { id: 1, title: "Introducere în slăbirea sănătoasă", duration: "15 min" },
            { id: 2, title: "Cum funcționează caloriile", duration: "20 min" },
            { id: 3, title: "Alimentația echilibrată", duration: "25 min" },
            { id: 4, title: "Greșeli frecvente în slăbire", duration: "18 min" },
            { id: 5, title: "Cum citești etichetele produselor", duration: "16 min" },
            { id: 6, title: "Proteine, carbohidrați și grăsimi", duration: "22 min" },
            { id: 7, title: "Controlul poftelor", duration: "19 min" },
            { id: 8, title: "Organizarea meselor", duration: "21 min" },
            { id: 9, title: "Hidratarea corectă", duration: "14 min" },
            { id: 10, title: "Mișcare pentru începători", duration: "24 min" },
            { id: 11, title: "Antrenamente acasă", duration: "30 min" },
            { id: 12, title: "Motivație și disciplină", duration: "17 min" },
            { id: 13, title: "Cum treci peste stagnare", duration: "20 min" },
            { id: 14, title: "Somnul și slăbirea", duration: "18 min" },
            { id: 15, title: "Stresul și alimentația", duration: "19 min" },
            { id: 16, title: "Mâncatul emoțional", duration: "23 min" },
            { id: 17, title: "Planificarea săptămânii", duration: "16 min" },
            { id: 18, title: "Mese sănătoase rapide", duration: "21 min" },
            { id: 19, title: "Cum mănânci în oraș", duration: "17 min" },
            { id: 20, title: "Cum eviți efectul yo-yo", duration: "25 min" },
            { id: 21, title: "Monitorizarea progresului", duration: "19 min" },
            { id: 22, title: "Menținerea rezultatului", duration: "20 min" },
            { id: 23, title: "Construirea unui stil de viață", duration: "22 min" },
            { id: 24, title: "Transformarea finală", duration: "26 min" }
        ];

        function initDashboard() {
            const user = JSON.parse(localStorage.getItem('fiifit_user'));
            if (!user || !user.logged_in) {
                window.location.href = 'members.html';
                return;
            }

            const email = user.email;
            const firstLetter = email[0].toUpperCase();
            document.getElementById('userAvatar').textContent = firstLetter;

            renderLessons();
            updateProgress();
        }

        function renderLessons() {
            const grid = document.getElementById('lessonsGrid');
            const completed = JSON.parse(localStorage.getItem('fiifit_completed') || '[]');

            LESSONS.forEach(lesson => {
                const isCompleted = completed.includes(lesson.id);
                const card = document.createElement('div');
                card.className = `lesson-card ${isCompleted ? '' : ''}`;
                card.innerHTML = `
                    <div class="lesson-number">${lesson.id}</div>
                    <div class="lesson-title">${lesson.title}</div>
                    <div class="lesson-status"><i class="fas fa-clock" style="margin-right: 8px;"></i>${lesson.duration}</div>
                    ${isCompleted ? '<div class="lesson-badge"><i class="fas fa-check" style="margin-right: 6px;"></i>Completată</div>' : ''}
                `;

                if (!isCompleted) {
                    card.onclick = () => markAsCompleted(lesson.id);
                }

                grid.appendChild(card);
            });
        }

        function markAsCompleted(lessonId) {
            let completed = JSON.parse(localStorage.getItem('fiifit_completed') || '[]');
            if (!completed.includes(lessonId)) {
                completed.push(lessonId);
                localStorage.setItem('fiifit_completed', JSON.stringify(completed));
                location.reload();
            }
        }

        function updateProgress() {
            const completed = JSON.parse(localStorage.getItem('fiifit_completed') || '[]');
            const percentage = (completed.length / 24) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('completedCount').textContent = completed.length;
        }

        function logout() {
            if (confirm('Sigur vrei să te deconectezi?')) {
                localStorage.removeItem('fiifit_user');
                window.location.href = 'members.html';
            }
        }

        initDashboard();
    </script>
</body>
</html>
